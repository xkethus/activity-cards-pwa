[build]
  command   = "npm run build"
  publish   = "dist"

# SPA — todas las rutas apuntan a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad + caché óptimo para PWA
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
